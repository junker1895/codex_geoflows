<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoFlows – Flood Forecast Map</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="map"></div>
  <canvas id="river-flow-canvas" aria-hidden="true"></canvas>
  <div id="provider-toggle">
    <button class="provider-btn active" data-provider="geoglows">GeoGloWS</button>
    <button class="provider-btn" data-provider="glofas">GloFAS</button>
  </div>
  <div id="flow-controls" class="hidden">
    <div id="flow-controls-title">Flow Animation Tuning</div>
    <label>Length <input id="flow-dash-length" type="range" min="2" max="30" step="1" /><span id="flow-dash-length-val"></span></label>
    <label>Gap <input id="flow-gap-length" type="range" min="6" max="40" step="1" /><span id="flow-gap-length-val"></span></label>
    <label>Speed <input id="flow-speed-mult" type="range" min="0.2" max="3" step="0.1" /><span id="flow-speed-mult-val"></span></label>
    <label>Size <input id="flow-width-mult" type="range" min="0.5" max="3" step="0.1" /><span id="flow-width-mult-val"></span></label>
    <label>Opacity <input id="flow-opacity-mult" type="range" min="0.2" max="2" step="0.05" /><span id="flow-opacity-mult-val"></span></label>
    <label>Pulse <input id="flow-pulse-mult" type="range" min="0" max="2" step="0.1" /><span id="flow-pulse-mult-val"></span></label>
    <button id="flow-copy-config" type="button">Copy config</button>
  </div>
  <div id="legend">
    <h3>Flood Risk</h3>
    <div class="legend-item"><span class="swatch" style="background:#1a9850"></span> Normal</div>
    <div class="legend-item"><span class="swatch" style="background:#fee08b"></span> RP 2-yr</div>
    <div class="legend-item"><span class="swatch" style="background:#fdae61"></span> RP 5-yr</div>
    <div class="legend-item"><span class="swatch" style="background:#f46d43"></span> RP 10-yr</div>
    <div class="legend-item"><span class="swatch" style="background:#d73027"></span> RP 25-yr</div>
    <div class="legend-item"><span class="swatch" style="background:#a50026"></span> RP 50-yr</div>
    <div class="legend-item"><span class="swatch" style="background:#67001f"></span> RP 100-yr</div>
  </div>
  <div id="info-panel" class="hidden">
    <div id="info-titlebar">
      <span id="info-title">Reach Info</span>
      <button id="info-close">&times;</button>
    </div>
    <div id="info-content"></div>
    <canvas id="forecast-chart"></canvas>
  </div>
  <div id="status-bar">Loading…</div>
  <div id="river-debug" class="hidden"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
