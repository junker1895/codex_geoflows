services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: geoflows
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - target: 5432
        published: "${POSTGRES_HOST_PORT:-5433}"
        protocol: tcp
        mode: host
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/geoflows
    depends_on:
      - postgres
    ports:
      - target: 8000
        published: "${APP_PORT:-8000}"
        protocol: tcp
        mode: host
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - forecast_artifacts:/app/data/forecast_artifacts
      - forecast_cache:/app/data/forecast_cache
      - geoglows_raw:/app/data/geoglows_raw
      - glofas_raw:/app/data/glofas_raw

volumes:
  pgdata:
  forecast_artifacts:
  forecast_cache:
  geoglows_raw:
  glofas_raw:
